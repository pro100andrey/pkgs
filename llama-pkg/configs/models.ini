version = 1

[*]
jinja = true
flash-attn = on
parallel = 2

[Qwen3.6-35B-A3B-UD-IQ3_S]
model = TARGET_PATH/Qwen3.6-35B-A3B-UD-IQ3_S.gguf
ctx-size = 184320
n-gpu-layers = 99
threads = 8
threads-batch = 16

temp = 0.5
top-p = 0.95
top-k = 20
min-p = 0.05
reasoning = on
presence-penalty = 0.0 
repeat-penalty = 1.1

spec-type = ngram-mod

; Original values for n-gram mod
spec-ngram-mod-n-match = 24
spec-ngram-mod-n-min = 48
spec-ngram-mod-n-max = 64


chat-template-kwargs = {"preserve_thinking": true}