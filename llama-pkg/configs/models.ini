version = 1

[*]
jinja = true
flash-attn = on
parallel = 2

[Qwen3.6-35B-A3B-UD-IQ3_S]
model = TARGET_PATH/Qwen3.6-35B-A3B-UD-IQ3_S.gguf
c = 102400
n-gpu-layers = 41
threads = 8
threads-batch = 16

prio = 3
temp = 0.5
top-p = 0.95
top-k = 20
min-p = 0.05
reasoning = on
presence-penalty = 0.0 
repeat-penalty = 1.1
repeat-last-n = 256
spec-ngram-size-n = 12
draft-min = 4
draft-max = 24

spec-type = ngram-mod
spec-ngram-mod-n-match = 12
spec-ngram-mod-n-min = 3
spec-ngram-mod-n-max = 24

dry-multiplier = 0.8
dry-base = 1.75
dry-allowed-length = 2

mlock = true
numa = isolate
fit = on

chat-template-kwargs = {"preserve_thinking": true}