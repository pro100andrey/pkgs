; Global llama-server preset template.
; During install, TARGET_PATH is replaced with your absolute model directory.

version = 1

[*]
jinja = true
flash-attn = on

[Qwen3.6-35B-A3B-UD-IQ4_NL]
model = TARGET_PATH/Qwen3.6-35B-A3B-UD-IQ4_NL.gguf
ctx-size = 120000
n-gpu-layers = 99
threads = 8
threads-batch = 16
mmap = false
flash-attn = on

temp = 0.4
top-p = 0.95
top-k = 20
min-p = 0.05
reasoning = on
presence-penalty = 0.1 
repeat-penalty = 1.15

; spec-type = ngram-mod
; ; Original values for n-gram mod
; spec-ngram-mod-n-match = 24
; spec-ngram-mod-n-min = 48
; spec-ngram-mod-n-max = 64

chat-template-kwargs = {"preserve_thinking": true}


[gemma-4-26B-A4B-it-UD-IQ4_NL]
model = TARGET_PATH/gemma-4-26B-A4B-it-UD-IQ4_NL.gguf
ctx-size = 120000
n-gpu-layers = 99
threads = 8
threads-batch = 16
mmap = false
flash-attn = on

temp = 1.0
top-p = 0.95
top-k = 64

reasoning = on

chat-template-kwargs = {"preserve_thinking": true}
